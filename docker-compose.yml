services:
  web:
    build: .
    container_name: rideshare_django
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=rideshare_backend.settings
      - MYSQLDATABASE=rideshare_db
      - MYSQLUSER=rideshare_user
      - MYSQLPASSWORD=ridesharepassword
      - MYSQLHOST=db
      - MYSQLPORT=3306
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=local-dev-key
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.0
    container_name: rideshare_mysql
    environment:
      MYSQL_DATABASE: rideshare_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: rideshare_user
      MYSQL_PASSWORD: ridesharepassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: rideshare_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql_data:
