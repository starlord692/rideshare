{% extends "base.html" %}

{% block content %}
<div id="ride-details-container" style="padding: 6rem 1.5rem 1.5rem 1.5rem; height: 100%; overflow-y: auto; padding-bottom: 6rem;">
    <!-- Loading State -->
    <div id="details-loading" style="text-align: center; padding: 4rem;">
        <div class="pulse-animation" style="width: 40px; height: 40px; border-radius: 50%; background: var(--accent-color); margin: 0 auto;"></div>
        <p style="margin-top: 1rem; color: var(--text-secondary);">Loading ride details...</p>
    </div>

    <!-- Details Content (Initially Hidden) -->
    <div id="details-content" style="display: none;">
        <!-- Mini Map -->
        <div style="height: 200px; border-radius: 16px; overflow: hidden; margin-bottom: 1.5rem; border: 1px solid var(--glass-border);">
            <div id="mini-map" style="width: 100%; height: 100%;"></div>
        </div>

        <!-- Ride Info -->
        <div class="glass-panel" style="padding: 1.5rem; margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                <div>
                    <h3 id="ride-title" style="margin-bottom: 0.25rem;">Ride to Destination</h3>
                    <div id="ride-time" style="color: var(--text-secondary); font-size: 0.875rem;">Loading...</div>
                </div>
                <div style="text-align: right;">
                    <div id="ride-cost" style="font-weight: 700; color: var(--success); font-size: 1.5rem;">₹0</div>
                    <div style="font-size: 0.75rem; color: var(--text-secondary);">per seat</div>
                </div>
            </div>

            <!-- Route Timeline -->
            <div style="position: relative; padding-left: 1.5rem; margin-bottom: 1.5rem;">
                <div style="position: absolute; left: 7px; top: 5px; bottom: 5px; width: 2px; background: var(--glass-border);"></div>
                
                <div style="position: relative; margin-bottom: 1.5rem;">
                    <div style="position: absolute; left: -26px; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--accent-color); border: 2px solid var(--bg-dark);"></div>
                    <div style="font-weight: 600;">Pickup</div>
                    <div id="ride-pickup" style="font-size: 0.875rem; color: var(--text-secondary);">Loading...</div>
                </div>
                
                <div style="position: relative;">
                    <div style="position: absolute; left: -26px; top: 2px; width: 12px; height: 12px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg-dark);"></div>
                    <div style="font-weight: 600;">Dropoff</div>
                    <div id="ride-dropoff" style="font-size: 0.875rem; color: var(--text-secondary);">Loading...</div>
                </div>
            </div>

            <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 1rem 0;">

            <!-- Driver Info -->
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <img id="driver-avatar" src="https://ui-avatars.com/api/?name=D&background=random" alt="Driver" style="width: 50px; height: 50px; border-radius: 50%;">
                    <div>
                        <div id="driver-name" style="font-weight: 600;">Driver Name</div>
                        <div id="vehicle-details" style="font-size: 0.875rem; color: var(--text-secondary);">Vehicle info</div>
                    </div>
                </div>
                <div id="chat-btn-container"></div>
            </div>
        </div>

        <!-- Action Button -->
        <div id="action-btn-container"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const rideId = "{{ ride_id }}"; // This should be passed from view or URL

    document.addEventListener('DOMContentLoaded', async () => {
        const pathSegments = window.location.pathname.split('/');
        const idFromUrl = pathSegments[pathSegments.length - 2];
        loadRideDetails(idFromUrl);
    });

    async function loadRideDetails(id) {
        try {
            const response = await fetch(`/api/rides/${id}/`);
            if (!response.ok) throw new Error('Ride not found');
            const ride = await response.json();

            // Populate UI
            document.getElementById('ride-time').innerText = new Date(ride.departure_time).toLocaleString();
            document.getElementById('ride-cost').innerText = '₹' + ride.total_cost;
            document.getElementById('ride-pickup').innerText = ride.pickup_location;
            document.getElementById('ride-dropoff').innerText = ride.dropoff_location;
            document.getElementById('driver-name').innerText = ride.driver_name;
            document.getElementById('driver-avatar').src = `https://ui-avatars.com/api/?name=${ride.driver_name}&background=random`;
            
            // Check current user status relative to this ride
            await renderActions(ride);

            document.getElementById('details-loading').style.display = 'none';
            document.getElementById('details-content').style.display = 'block';

            // Init Mini Map
            const map = L.map('mini-map', { zoomControl: false, dragging: false }).setView([ride.pickup_lat, ride.pickup_lng], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.marker([ride.pickup_lat, ride.pickup_lng]).addTo(map);
            L.marker([ride.dropoff_lat, ride.dropoff_lng]).addTo(map);
        } catch (err) {
            document.getElementById('details-loading').innerHTML = `<p style="color: var(--danger);">Error: ${err.message}</p>`;
        }
    }

    async function renderActions(ride) {
        const actionContainer = document.getElementById('action-btn-container');
        const chatContainer = document.getElementById('chat-btn-container');
        
        // We need to know the current user
        // For simplicity, we can fetch my requests and see if I'm in there
        const myReqsResponse = await fetch('/api/rides/my-requests/');
        const myReqs = await myReqsResponse.json();
        const myReq = myReqs.find(r => r.ride == ride.id);

        // Check if I am the driver
        // We'd ideally have current_user.id in the template
        // For now, let's assume we can tell from the ride object if needed, or another API call
        const meResponse = await fetch('/api/auth/user/');
        const me = await meResponse.json();

        if (me.id === ride.driver) {
            actionContainer.innerHTML = `<a href="/dashboard/" class="primary-btn btn-ripple">Manage in Dashboard</a>`;
            chatContainer.innerHTML = `<a href="/chat/${ride.id}/" class="icon-btn" style="background: rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 50%;"><i class="bi bi-chat-dots"></i></a>`;
        } else if (myReq) {
            actionContainer.innerHTML = `
                <div class="glass-panel" style="padding: 1rem; text-align: center;">
                    <span style="font-weight: 700; text-transform: uppercase; color: var(--accent-color);">${myReq.status}</span>
                </div>
            `;
            if (myReq.status === 'accepted') {
                chatContainer.innerHTML = `<a href="/chat/${ride.id}/" class="icon-btn" style="background: rgba(255,255,255,0.1); padding: 0.5rem; border-radius: 50%;"><i class="bi bi-chat-dots"></i></a>`;
            }
        } else if (ride.available_seats > 0 && ['open', 'upcoming', 'active', 'ongoing'].includes(ride.status)) {
            actionContainer.innerHTML = `<button onclick="requestJoin(${ride.id})" class="primary-btn btn-ripple">Request to Join</button>`;
        } else {
            actionContainer.innerHTML = `<button class="primary-btn" disabled style="opacity: 0.5;">Ride Unavailable</button>`;
        }
    }

    async function requestJoin(rideId) {
        try {
            const response = await fetch('/api/rides/request/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    ride: rideId,
                    seats_requested: 1
                })
            });
            if (response.ok) {
                alert('Request sent!');
                location.reload();
            } else {
                const data = await response.json();
                alert(data.error || 'Failed to send request');
            }
        } catch (err) {}
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
