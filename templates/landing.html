<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RidePool - Travel Smart</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .landing-container {
            text-align: center;
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        .car-animation {
            font-size: 5rem;
            color: var(--accent-color);
            position: relative;
            display: inline-block;
            animation: driveAcrossLanding 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.5));
        }

        @keyframes driveAcrossLanding {
            0% { transform: translateX(-50px); opacity: 0; }
            20% { transform: translateX(0); opacity: 1; }
            80% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(50px); opacity: 0; }
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-top: 1.5rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.25rem;
            margin-top: 1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-group {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .cta-btn {
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .btn-primary-landing {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-primary-landing:hover {
            transform: translateY(-5px);
            background: var(--accent-hover);
        }

        .btn-secondary-landing {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary-landing:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        /* Background Decorations */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.1);
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: rgba(192, 132, 252, 0.1);
            bottom: -50px;
            left: -50px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="landing-container">
        <div class="car-animation">
            <i class="bi bi-car-front-fill"></i>
        </div>
        <h1 class="hero-title">RidePool</h1>
        <p class="tagline">Ride Together. Save More. Travel Smart. Join our community of eco-conscious travelers today.</p>
        
        <div class="cta-group">
            <a href="/login/" class="cta-btn btn-primary-landing">Login</a>
            <a href="/signup/" class="cta-btn btn-secondary-landing">Sign Up</a>
        </div>
    </div>
</body>
</html>
