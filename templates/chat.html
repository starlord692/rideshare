{% extends "base.html" %}

{% block content %}
<div id="chat-container" style="display: flex; flex-direction: column; height: 100%; padding-top: 5rem;">
    <!-- Permission Error (Hidden) -->
    <div id="chat-error" style="display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; text-align: center; gap: 1rem;">
        <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: var(--danger);"></i>
        <h3>Chat Locked</h3>
        <p id="error-message" style="color: var(--text-secondary);">Chat unlocks after the ride owner accepts your request.</p>
        <a href="/dashboard/" class="primary-btn" style="width: auto; padding: 0.5rem 1.5rem; background: var(--glass-bg);">Go to Dashboard</a>
    </div>

    <!-- Chat Content (Hidden) -->
    <div id="chat-content" style="display: none; flex-direction: column; height: 100%;">
        <!-- Chat Header -->
        <div style="padding: 1rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 1rem; background: var(--bg-dark);">
            <a href="/dashboard/" style="color: var(--text-primary);"><i class="bi bi-arrow-left" style="font-size: 1.5rem;"></i></a>
            <div id="chat-ride-info">
                <div style="font-weight: 600;">Ride Chat</div>
                <div id="chat-status" style="font-size: 0.75rem; color: var(--success);">Connecting...</div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
            <!-- Messages load here -->
        </div>

        <!-- Chat Input -->
        <div style="padding: 1rem; background: var(--bg-dark); border-top: 1px solid var(--glass-border); padding-bottom: 2rem;">
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="text" id="chat-input" class="glass-input" style="padding-left: 1.5rem; border-radius: 24px;" placeholder="Type a message...">
                <button id="send-btn" class="icon-btn" style="color: var(--accent-color); background: rgba(59, 130, 246, 0.1); width: 45px; height: 45px; border-radius: 50%;"><i class="bi bi-send-fill"></i></button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const rideId = window.location.pathname.split('/')[2];
    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('chat-input');
    const currentUsername = '{{ request.user.username }}';
    let chatSocket = null;

    console.log("Chat initialized for Ride ID:", rideId);

    document.addEventListener('DOMContentLoaded', checkPermissionAndInit);

    async function checkPermissionAndInit() {
        try {
            console.log("Checking chat permissions and loading history...");
            const historyResponse = await fetch(`/api/chat/${rideId}/`);
            const data = await historyResponse.json();

            if (!historyResponse.ok) {
                console.error("Permission check failed:", data);
                document.getElementById('error-message').innerText = data.error || data.detail || "Chat unlocks after ride owner accepts your request.";
                document.getElementById('chat-error').style.display = 'flex';
                return;
            }
            
            document.getElementById('chat-content').style.display = 'flex';
            
            // Render History
            if (Array.isArray(data)) {
                data.forEach(msg => appendMessage(msg.sender_name, msg.content, new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})));
            }
            
            // Init WebSocket
            initWebSocket();
        } catch (err) {
            console.error("Initialization error:", err);
            document.getElementById('chat-error').style.display = 'flex';
        }
    }

    function initWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/chat/${rideId}/`;
        console.log("Connecting to WebSocket:", wsUrl);
        
        chatSocket = new WebSocket(wsUrl);

        chatSocket.onopen = () => {
            console.log("WebSocket connected successfully!");
            document.getElementById('chat-status').innerText = 'Online';
            document.getElementById('chat-status').style.color = 'var(--success)';
        };

        chatSocket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            console.log("New message received via WebSocket:", data);
            appendMessage(data.sender, data.message, data.timestamp || new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
        };

        chatSocket.onerror = (err) => {
            console.error("WebSocket error observed:", err);
        };

        chatSocket.onclose = (e) => {
            console.log("WebSocket connection closed:", e.code, e.reason);
            document.getElementById('chat-status').innerText = 'Offline';
            document.getElementById('chat-status').style.color = 'var(--danger)';
        };
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;
        
        if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
            console.error("WebSocket is not open. State:", chatSocket ? chatSocket.readyState : "null");
            alert("Connection lost. Please refresh the page.");
            return;
        }
        
        console.log("Sending message:", text);
        chatSocket.send(JSON.stringify({ 'message': text }));
        input.value = '';
    }

    function appendMessage(sender, text, timeString) {
        const isSent = sender === currentUsername;
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-bubble ${isSent ? 'sent' : 'received'}`;
        
        msgDiv.innerHTML = `
            ${!isSent ? `<div style="font-size: 0.7rem; color: var(--accent-color); margin-bottom: 2px;">${sender}</div>` : ''}
            ${text}
            <div style="font-size: 0.6rem; opacity: 0.7; text-align: right; margin-top: 4px;">${timeString}</div>
        `;
        
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
</script>
{% endblock %}
