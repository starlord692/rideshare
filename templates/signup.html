{% extends "base.html" %}

{% block content %}
<div style="display: flex; flex-direction: column; height: 100%; justify-content: center; align-items: center; padding: 2rem;">
    <div class="glass-panel" style="width: 100%; max-width: 500px; padding: 2rem; max-height: 90vh; overflow-y: auto;">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <h2 class="nav-brand" style="font-size: 1.8rem;">Create Account</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Join RidePool today.</p>
        </div>

        {% if error %}
        <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #fca5a5;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" class="glass-input" placeholder="Username" required autofocus>
                </div>
                <div class="input-group">
                    <i class="bi bi-envelope"></i>
                    <input type="email" name="email" class="glass-input" placeholder="Email" required>
                </div>
            </div>

            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="glass-input" placeholder="Password" required>
            </div>

            <div class="input-group">
                <i class="bi bi-person-fill"></i>
                <input type="text" name="full_name" class="glass-input" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <i class="bi bi-telephone"></i>
                <input type="text" name="phone_number" class="glass-input" placeholder="Phone Number" required>
            </div>

            <div class="input-group">
                <i class="bi bi-person-badge"></i>
                <select name="role" class="glass-input" style="appearance: none;" required>
                    <option value="" disabled selected style="color: black;">Select Role</option>
                    <option value="passenger" style="color: black;">Passenger</option>
                    <option value="driver" style="color: black;">Driver</option>
                    <option value="both" style="color: black;">Both</option>
                </select>
            </div>

            <h3 style="margin-top: 1.5rem; margin-bottom: 1rem; font-size: 1.1rem; color: var(--accent-color); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Emergency SOS Contact</h3>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">We'll notify this contact when you trigger an SOS.</p>

            <div class="input-group">
                <i class="bi bi-person-hearts"></i>
                <input type="text" name="emergency_contact_name" class="glass-input" placeholder="Contact Name" required>
            </div>

            <div class="input-group">
                <i class="bi bi-telephone-plus"></i>
                <input type="text" name="emergency_contact_phone" class="glass-input" placeholder="Contact Phone Number" required>
            </div>

            <button type="submit" class="primary-btn btn-ripple" style="margin-top: 1.5rem;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
