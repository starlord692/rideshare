{% extends "base.html" %}

{% block content %}
<div style="padding: 6rem 1.5rem 1.5rem 1.5rem; height: 100%; overflow-y: auto; padding-bottom: 6rem;">
    <h2 style="margin-bottom: 1.5rem;">Notifications</h2>

    <div id="notifications-page-list" style="display: flex; flex-direction: column; gap: 1rem;">
        <!-- Notifications loaded via JS -->
        <div class="glass-panel" style="padding: 2rem; text-align: center; color: var(--text-secondary);">
            Loading...
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', loadNotificationsPage);

    async function loadNotificationsPage() {
        const list = document.getElementById('notifications-page-list');
        try {
            const response = await fetch('/api/notifications/');
            const data = await response.json();
            
            if (data.length === 0) {
                list.innerHTML = `<div class="glass-panel" style="padding: 2rem; text-align: center; color: var(--text-secondary);">No notifications yet.</div>`;
                return;
            }

            list.innerHTML = '';
            data.forEach(n => {
                const item = document.createElement('div');
                item.className = 'glass-panel';
                item.style.padding = '1.25rem';
                item.style.opacity = n.is_read ? '0.6' : '1';
                item.style.borderLeft = n.is_read ? 'none' : '4px solid var(--accent-color)';
                
                item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                        <div style="font-weight: 700;">${n.title}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);">${new Date(n.created_at).toLocaleString()}</div>
                    </div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">${n.message}</div>
                    ${!n.is_read ? `<button onclick="markReadPage(${n.id})" class="sidebar-item" style="padding: 0.4rem 0.8rem; margin: 0; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.75rem;">Mark as Read</button>` : ''}
                `;
                list.appendChild(item);
            });
        } catch (err) {
            list.innerHTML = 'Error loading notifications.';
        }
    }

    async function markReadPage(id) {
        await fetch(`/api/notifications/${id}/read/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': getCookie('csrftoken') }
        });
        loadNotificationsPage();
        if (typeof updateUnreadCount === 'function') updateUnreadCount();
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
