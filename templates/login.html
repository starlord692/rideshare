{% extends "base.html" %}

{% block content %}
<div style="display: flex; flex-direction: column; height: 100%; justify-content: center; align-items: center; padding: 2rem;">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="bi bi-car-front-fill car-icon" style="font-size: 3rem; color: var(--accent-color); animation: none; transform: none;"></i>
            <h1 class="nav-brand" style="margin-top: 1rem; font-size: 2rem;">RidePool</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Welcome back, please login.</p>
        </div>

        {% if form.errors %}
        <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #fca5a5;">
            Invalid username or password.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="input-group">
                <i class="bi bi-person"></i>
                <input type="text" name="username" class="glass-input" placeholder="Username" required autofocus>
            </div>
            
            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="glass-input" placeholder="Password" required>
            </div>
            
            <button type="submit" class="primary-btn btn-ripple" style="margin-top: 1rem;">Login</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'signup' %}" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
